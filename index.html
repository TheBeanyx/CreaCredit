<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivatalos Creditek</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            padding: 40px;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            border-top: 5px solid #2c3e50;
        }

        h2 {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            background-color: #2c3e50;
            border: none;
            border-radius: 2px;
            text-decoration: none;
            transition: background-color 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Szovjet Credit</h2>
    <p>Érrezze magát úgy mintha a Szovjet Unióba lenne:</p>
    <a href="szovjet_credit.html" class="btn">Megnyitás</a>
</div>

</body>
</html>
